<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>YGO Auto-Battler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="stylesheet" href="/game/game.css">
<style>
/* MainMenu */
.main-menu {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 48px;
  padding: 32px 24px;
}
.main-menu-hero { text-align: center; }
.main-menu-logo { font-size: 72px; line-height: 1; margin-bottom: 16px; }
.main-menu-title { font-size: 2rem; font-weight: 800; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }
.main-menu-subtitle { color: var(--muted); font-size: 0.9rem; }
.main-menu-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
.btn-full { width: 100%; }

/* DeckSelector */
.deck-list { display: flex; flex-direction: column; gap: 10px; }
.empty-state { text-align: center; padding: 60px 24px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.empty-sub { color: var(--muted); font-size: 13px; }
.deck-selector-footer { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }

/* DeckBuilder */
.deck-builder-layout {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.deck-slots-panel, .card-browser-panel {
  padding: 12px 16px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.deck-slots-panel { border-bottom: 1px solid var(--border); max-height: 40%; }
.card-browser-panel { flex: 1; }
.panel-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 10px; }
.deck-tiers { display: flex; flex-direction: column; gap: 8px; }
.tier-row { display: flex; align-items: center; gap: 8px; }
.tier-label { flex-shrink: 0; min-width: 54px; text-align: center; }
.tier-slots { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; }
.deck-slot { width: 38px; height: 52px; border-radius: var(--radius-sm); border: 1px dashed var(--border); flex-shrink: 0; }
.deck-slot.empty { background: var(--surface2); }
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  outline: none;
  margin-bottom: 10px;
}
.search-input:focus { border-color: var(--accent); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; }
.loading-text { color: var(--muted); font-size: 13px; grid-column: 1/-1; }

/* GameScreen */
.game-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.board-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.board-placeholder, .hand-placeholder {
  text-align: center;
  color: var(--muted);
  padding: 24px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  font-weight: 600;
}
.muted-text { font-size: 11px; color: var(--border); margin-top: 6px; }
.hand-area {
  height: var(--hand-height);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  flex-shrink: 0;
}
.phase-controls { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.game-hud { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 700; }
.hud-round { color: var(--muted); }
.hud-hp.player { color: var(--green); }
.hud-hp.enemy { color: var(--red); }
</style>
</head>
<body>
  <div id="screen"></div>
  <script type="module" src="/game/main.js"></script>
</body>
</html>
