<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YGO Card Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d26;
  --surface2: #22263a;
  --border: #2d3148;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --text: #e8eaf6;
  --muted: #8892b0;
  --tier1: #78c8a8;
  --tier2: #6ab4e8;
  --tier3: #c878e0;
  --tier4: #f0a040;
  --tier5: #f05050;
  --green: #4caf80;
  --red: #f04050;
  --yellow: #f0c040;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
.topbar h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
.tabs { display: flex; gap: 4px; }
.tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; color: var(--muted); font-weight: 500; transition: all .15s; border: none; background: none; font-size: 14px; }
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { color: var(--text); background: var(--accent); }
.main { flex: 1; overflow: hidden; display: flex; }

/* Sidebar */
.sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.sidebar-list { flex: 1; overflow-y: auto; }
.list-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; transition: background .1s; }
.list-item:hover { background: var(--surface2); }
.list-item.selected { background: var(--surface2); border-left: 3px solid var(--accent); }
.list-item .item-id { font-size: 11px; color: var(--muted); font-family: monospace; }
.list-item .item-name { font-weight: 500; flex: 1; }
.list-item .item-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Card detail */
.detail-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; }
.illustration-box { width: 120px; height: 160px; background: var(--surface2); border: 2px dashed var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; flex-shrink: 0; position: relative; overflow: hidden; }
.illustration-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.illustration-box .illus-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.7); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; opacity: 0; transition: opacity .2s; }
.illustration-box:hover .illus-overlay { opacity: 1; }
.illus-text { font-size: 11px; color: var(--muted); text-align: center; }

.detail-info { flex: 1; }
.detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
.badge-tier1 { background: #1a3a2e; color: var(--tier1); }
.badge-tier2 { background: #1a2e3a; color: var(--tier2); }
.badge-tier3 { background: #2e1a3a; color: var(--tier3); }
.badge-tier4 { background: #3a2a10; color: var(--tier4); }
.badge-tier5 { background: #3a1010; color: var(--tier5); }
.badge-summon { background: var(--surface2); color: var(--text); }
.badge-power { background: #1a2e3a; color: #88ccff; }
.badge-illus { background: #1a3a1a; color: var(--green); }
.badge-no-illus { background: #3a1a1a; color: var(--red); }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.wide { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.field input, .field select, .field textarea {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none; width: 100%;
  font-family: inherit;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 60px; }
.field select option { background: var(--surface2); }

.section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

/* Archetype chips */
.arch-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.arch-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.arch-chip:hover { border-color: var(--red); }
.arch-chip .remove { color: var(--red); font-weight: 700; }
.arch-add { background: none; border: 1px dashed var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
.arch-add:hover { border-color: var(--accent); color: var(--accent); }

/* Materials list */
.materials-list { display: flex; flex-direction: column; gap: 6px; }
.material-item { display: flex; align-items: center; gap: 8px; background: var(--surface2); padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); }
.material-item span { flex: 1; font-family: monospace; font-size: 12px; }
.material-item button { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; line-height: 1; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #7b73ff; }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #ff5060; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #5cbf90; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.actions { display: flex; gap: 10px; margin-top: 20px; }

/* Search / filter */
input[type=search], input[type=text].search { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; outline: none; width: 100%; font-size: 13px; }
input[type=search]:focus { border-color: var(--accent); }
select.filter { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; outline: none; font-size: 12px; }
select.filter:focus { border-color: var(--accent); }

/* Count badge */
.count { background: var(--surface2); color: var(--muted); font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-left: auto; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.hidden { display: none !important; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; z-index: 200; font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,.4); transition: opacity .3s; }
.toast.ok { border-left: 3px solid var(--green); }
.toast.err { border-left: 3px solid var(--red); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Archetype detail */
.threshold-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.effect-block { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-top: 8px; }

/* Empty state */
.empty { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); flex-direction: column; gap: 8px; }
.empty svg { opacity: .3; }

.illus-import { display: flex; gap: 6px; }
.illus-import input { flex: 1; }

/* FAB + Back button (mobile) */
.fab {
  display: none; position: fixed; bottom: 24px; right: 20px;
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 30px; line-height: 1;
  border: none; cursor: pointer; z-index: 90;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(108,99,255,.55); transition: transform .15s;
}
.fab:active { transform: scale(.9); }
.back-btn {
  display: none; align-items: center; gap: 6px;
  background: none; border: none; color: var(--accent);
  font-size: 14px; font-weight: 700; padding: 0 0 14px; cursor: pointer;
}
.back-btn::before { content: '←'; font-size: 18px; }
.mobile-info { display: none; }

@media (max-width: 768px) {
  /* Topbar */
  .topbar { padding: 10px 12px; gap: 8px; }
  .topbar h1 { font-size: 14px; white-space: nowrap; }
  .tab { padding: 5px 9px; font-size: 12px; }

  /* Single-panel layout */
  .main { position: relative; overflow: hidden; }
  .sidebar {
    width: 100%; position: absolute; inset: 0; z-index: 2;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .content {
    position: absolute; inset: 0; width: 100%; padding: 16px;
    background: var(--bg); overflow-y: auto;
    transform: translateX(105%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .main.show-detail .sidebar  { transform: translateX(-105%); pointer-events: none; }
  .main.show-detail .content  { transform: translateX(0); pointer-events: auto; }

  /* Stats tab — no sidebar, always visible */
  #tab-stats .content {
    transform: none !important; position: relative !important;
    inset: auto !important; height: 100% !important;
  }

  /* FAB & back btn */
  .fab      { display: flex; }
  .back-btn { display: flex; }
  .mobile-info { display: block; }

  /* Forms: 1 column */
  .form-grid  { grid-template-columns: 1fr !important; gap: 10px; }
  .stats-grid { grid-template-columns: 1fr !important; }

  /* Touch-friendly inputs (16px prevents iOS zoom-in) */
  .field input, .field select, .field textarea {
    padding: 12px 10px; font-size: 16px;
  }
  select.filter { padding: 8px; font-size: 12px; }
  input[type=search] { font-size: 16px; padding: 10px; }

  /* List items — bigger tap target */
  .list-item { padding: 13px 14px; }

  /* Buttons */
  .btn { min-height: 44px; font-size: 14px; }
  .actions { flex-wrap: wrap; gap: 8px; }

  /* Illustration overlay always visible on touch */
  .illustration-box .illus-overlay { opacity: 1; }
  .illustration-box { width: 90px; height: 118px; }

  /* Stats */
  .stat-panel { padding: 14px 12px; }
  .tier-overview-table { font-size: 11px; }
  .tier-overview-table th, .tier-overview-table td { padding: 5px 7px; }
  .mini-bar-track { min-width: 40px; }

  /* Anomaly rows: simplified 2-col on mobile */
  .anomaly-header { display: none; }
  .anomaly-row {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 6px; padding: 10px 12px;
  }
  .anomaly-row .anomaly-col-pos,
  .anomaly-row .anomaly-col-tier { display: none; }
  .anomaly-row .anomaly-col-card { flex: 1; min-width: 0; }

  /* Modal */
  .modal { width: 96vw; padding: 18px; }

  /* Threshold row */
  .threshold-row { flex-wrap: wrap; gap: 6px; }
}

/* Stats tab */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
.stats-grid.wide { grid-template-columns: 1fr; }
.stat-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.stat-panel h3 { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }
.tier-overview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.tier-overview-table th { text-align: left; padding: 6px 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .4px; border-bottom: 1px solid var(--border); }
.tier-overview-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
.tier-overview-table tr:last-child td { border-bottom: none; }
.tier-overview-table tr:hover td { background: var(--surface2); }
.stat-val { font-weight: 700; }
.stat-range { font-size: 10px; color: var(--muted); }
.mini-bar-wrap { display: flex; align-items: center; gap: 6px; }
.mini-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; position: relative; min-width: 60px; }
.mini-bar-fill { position: absolute; top: 0; height: 100%; border-radius: 2px; }
.anomaly-row { display: grid; grid-template-columns: 1fr 60px 90px 100px 1fr 70px; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; font-size: 12px; }
.anomaly-row:hover { background: var(--surface2); }
.anomaly-row:last-child { border-bottom: none; }
.anomaly-header { display: grid; grid-template-columns: 1fr 60px 90px 100px 1fr 70px; gap: 10px; padding: 6px 12px; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid var(--border); }
.severity-bar { height: 6px; border-radius: 3px; }
.z-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-align: center; white-space: nowrap; }
.z-mild { background: #2a2a10; color: var(--yellow); }
.z-high { background: #3a1a10; color: var(--red); }
.direction-high { color: var(--red); }
.direction-low { color: #6ab4e8; }
.tier-filter-chips { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.tier-chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
.tier-chip.active { border-color: currentColor; }
.tier-chip-1.active { color: var(--tier1); background: #1a3a2e; border-color: var(--tier1); }
.tier-chip-2.active { color: var(--tier2); background: #1a2e3a; border-color: var(--tier2); }
.tier-chip-3.active { color: var(--tier3); background: #2e1a3a; border-color: var(--tier3); }
.tier-chip-4.active { color: var(--tier4); background: #3a2a10; border-color: var(--tier4); }
.tier-chip-5.active { color: var(--tier5); background: #3a1010; border-color: var(--tier5); }
.threshold-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; font-size: 12px; color: var(--muted); }
.threshold-row input[type=range] { accent-color: var(--accent); width: 120px; }
.stat-sparkline { display: flex; gap: 2px; align-items: flex-end; height: 24px; }
.spark-bar { width: 5px; border-radius: 2px 2px 0 0; background: var(--accent); opacity: .6; }
.spark-bar.highlight { opacity: 1; background: var(--accent2); }
.no-anomalies { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>YGO Card Manager</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('cards')">Cartes</button>
      <button class="tab" onclick="switchTab('archetypes')">Archétypes</button>
      <button class="tab" onclick="switchTab('powers')">Pouvoirs</button>
      <button class="tab" onclick="switchTab('stats')">📊 Stats</button>
    </div>
  </div>

  <!-- CARDS TAB -->
  <div id="tab-cards" class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;gap:8px;align-items:center">
          <input type="search" id="card-search" placeholder="Rechercher..." oninput="filterCards()">
          <span id="card-count" class="count">0</span>
        </div>
        <div style="display:flex;gap:6px">
          <select class="filter" id="filter-tier" onchange="filterCards()">
            <option value="">Tous tiers</option>
            <option value="1">Tier 1</option>
            <option value="2">Tier 2</option>
            <option value="3">Tier 3</option>
            <option value="4">Tier 4</option>
            <option value="5">Tier 5</option>
          </select>
          <select class="filter" id="filter-summon" onchange="filterCards()">
            <option value="">Tous types</option>
            <option value="normal">Normal</option>
            <option value="sacrifice">Sacrifice</option>
            <option value="fusion">Fusion</option>
            <option value="rituel">Rituel</option>
            <option value="transformation">Transformation</option>
          </select>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="openNewCard()">+ Nouvelle carte</button>
          <button class="btn btn-secondary btn-sm" onclick="openImportModal('cards')">Importer JSON</button>
        </div>
      </div>
      <div class="sidebar-list" id="card-list"></div>
    </div>
    <div class="content" id="card-detail">
      <div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span>Sélectionne une carte</span></div>
    </div>
  </div>

  <!-- ARCHETYPES TAB -->
  <div id="tab-archetypes" class="main hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;gap:8px;align-items:center">
          <input type="search" id="arch-search" placeholder="Rechercher..." oninput="filterArchetypes()">
          <span id="arch-count" class="count">0</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="openNewArchetype()">+ Nouvel archétype</button>
          <button class="btn btn-secondary btn-sm" onclick="openImportModal('archetypes')">Importer JSON</button>
        </div>
      </div>
      <div class="sidebar-list" id="arch-list"></div>
    </div>
    <div class="content" id="arch-detail">
      <div class="empty"><span>Sélectionne un archétype</span></div>
    </div>
  </div>

  <!-- POWERS TAB -->
  <div id="tab-powers" class="main hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;gap:8px;align-items:center">
          <input type="search" id="power-search" placeholder="Rechercher..." oninput="filterPowers()">
          <span id="power-count" class="count">0</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="openNewPower()">+ Nouveau pouvoir</button>
          <button class="btn btn-secondary btn-sm" onclick="openImportModal('powers')">Importer JSON</button>
        </div>
      </div>
      <div class="sidebar-list" id="power-list"></div>
    </div>
    <div class="content" id="power-detail">
      <div class="empty"><span>Sélectionne un pouvoir</span></div>
    </div>
  </div>
  <!-- STATS TAB -->
  <div id="tab-stats" class="main hidden">
    <div class="content" id="stats-content" style="padding:24px;overflow-y:auto;width:100%">
      <div class="empty"><span>Chargement...</span></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="fabAction()">+</button>

<!-- MODAL -->
<div class="modal-backdrop hidden" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- TOAST -->
<div class="toast hidden" id="toast"></div>

<script>
// ================== STATE ==================
let cards = [], archetypes = [], powers = [];
let selectedCard = null, selectedArch = null, selectedPower = null;
let currentTab = 'cards';
let isNewCard = false, isNewArch = false, isNewPower = false;

// ================== INIT ==================
async function init() {
  [cards, archetypes, powers] = await Promise.all([
    apiFetch('/api/cards'),
    apiFetch('/api/archetypes'),
    apiFetch('/api/powers'),
  ]);
  renderCardList();
  renderArchList();
  renderPowerList();
}

// ================== API ==================
async function apiFetch(url, options = {}) {
  const r = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  return r.json();
}

// ================== TABS ==================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.main').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(el => {
    const t = el.textContent.toLowerCase();
    const match = (tab === 'cards' && t.includes('carte')) ||
                  (tab === 'archetypes' && t.includes('archét')) ||
                  (tab === 'powers' && t.includes('pouv')) ||
                  (tab === 'stats' && t.includes('stat'));
    if (match) el.classList.add('active');
  });
  if (tab === 'stats') renderStats();
  showList(); // reset panel on tab switch
}

// ================== CARDS ==================
function tierBadge(tier) {
  return `<span class="badge badge-tier${Math.round(tier)}">T${Math.round(tier)}</span>`;
}
function summonLabel(t) {
  return { normal: 'Normal', sacrifice: 'Sacrifice', fusion: 'Fusion', rituel: 'Rituel', transformation: 'Transfo' }[t] || t;
}
function summonColor(t) {
  return { normal: '#78c8a8', sacrifice: '#f0a040', fusion: '#c878e0', rituel: '#6ab4e8', transformation: '#ff8040' }[t] || '#888';
}

function filterCards() {
  const q = document.getElementById('card-search').value.toLowerCase();
  const tier = document.getElementById('filter-tier').value;
  const summon = document.getElementById('filter-summon').value;
  const filtered = cards.filter(c =>
    (!q || c.name.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)) &&
    (!tier || Math.round(c.tier) == tier) &&
    (!summon || c.summon_type === summon)
  );
  renderCardList(filtered);
}

function renderCardList(list = cards) {
  const el = document.getElementById('card-list');
  document.getElementById('card-count').textContent = list.length;
  el.innerHTML = list.map(c => `
    <div class="list-item ${selectedCard && selectedCard.id === c.id ? 'selected' : ''}" onclick="selectCard('${c.id}')">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="item-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</span>
          ${c._has_illustration ? '<span style="font-size:10px;color:var(--green)">🖼</span>' : ''}
        </div>
        <div style="display:flex;gap:4px;margin-top:3px">
          ${tierBadge(c.tier)}
          <span class="badge" style="background:var(--surface2);color:${summonColor(c.summon_type)};font-size:10px">${summonLabel(c.summon_type)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function selectCard(id) {
  selectedCard = cards.find(c => c.id === id);
  isNewCard = false;
  filterCards();
  renderCardDetail();
  showDetail();
}

function getArchName(id) {
  const a = archetypes.find(x => x.id === id);
  return a ? `${a.icon || ''} ${a.name}` : id;
}
function getPowerName(id) {
  const p = powers.find(x => x.id === id);
  return p ? p.name : id;
}
function getCardName(id) {
  const c = cards.find(x => x.id === id);
  return c ? c.name : id;
}

function renderCardDetail() {
  const c = selectedCard;
  if (!c) return;
  const el = document.getElementById('card-detail');
  const hasIllus = c._has_illustration;
  const hasPower = c.power && c.power.id;

  el.innerHTML = `
    <button class="back-btn" onclick="showList()">Retour à la liste</button>
    <div class="detail-header">
      <div class="illustration-box" id="illus-box">
        ${hasIllus ? `<img src="/illustrations/${c.id}" id="illus-img" alt="">` : `<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" opacity=".3"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`}
        <div class="illus-overlay">
          ${hasIllus ? `<button class="btn btn-danger btn-sm" onclick="deleteIllustration()">Supprimer</button>` : ''}
          <button class="btn btn-secondary btn-sm" onclick="openIllusModal()">Importer URL</button>
        </div>
      </div>
      <div class="detail-info">
        <div class="detail-title">${c.name}</div>
        <div class="detail-meta">
          ${tierBadge(c.tier)}
          <span class="badge badge-summon">${summonLabel(c.summon_type)}</span>
          ${hasPower ? `<span class="badge badge-power">⚡ ${getPowerName(c.power.id)}</span>` : ''}
          <span class="badge ${hasIllus ? 'badge-illus' : 'badge-no-illus'}">${hasIllus ? '🖼 Illus.' : 'Pas d\'illus.'}</span>
        </div>
        <div style="font-family:monospace;font-size:11px;color:var(--muted)">${c.id}</div>
      </div>
    </div>

    <div class="section-title">Identité</div>
    <div class="form-grid">
      <div class="field"><label>ID</label><input id="f-id" value="${c.id}" placeholder="CORE_001"></div>
      <div class="field"><label>Nom</label><input id="f-name" value="${esc(c.name)}" placeholder="Nom de la carte"></div>
      <div class="field"><label>Tier</label>
        <select id="f-tier">
          ${[1,2,3,4,5].map(t => `<option value="${t}" ${Math.round(c.tier)==t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Type d'invocation</label>
        <select id="f-summon">
          ${['normal','sacrifice','fusion','rituel','transformation'].map(s => `<option value="${s}" ${c.summon_type===s?'selected':''}>${summonLabel(s)}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="section-title">Stats</div>
    <div class="stats-grid">
      <div class="field"><label>ATK</label><input type="number" id="f-atk" value="${c.stats.atk}" step="0.5"></div>
      <div class="field"><label>HP</label><input type="number" id="f-hp" value="${c.stats.hp}" step="0.5"></div>
      <div class="field"><label>Portée</label><input type="number" id="f-range" value="${c.stats.range}" step="0.5"></div>
      <div class="field"><label>Vitesse déplacement</label><input type="number" id="f-move" value="${c.stats.movement_speed}" step="0.5"></div>
      <div class="field"><label>Vitesse attaque</label><input type="number" id="f-aspeed" value="${c.stats.attack_speed}" step="0.5"></div>
      <div class="field"><label>Initiative</label><input type="number" id="f-init" value="${c.stats.initiative}" step="0.5"></div>
    </div>

    <div class="section-title">Pouvoir</div>
    <div class="form-grid">
      <div class="field"><label>Pouvoir</label>
        <select id="f-power-id" onchange="togglePowerFields()">
          <option value="">Aucun</option>
          ${powers.map(p => `<option value="${p.id}" ${hasPower && c.power.id===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select>
      </div>
      <div class="field" id="f-power-speed-wrap"><label>Vitesse pouvoir</label><input type="number" id="f-power-speed" value="${hasPower && c.power.power_speed != null ? c.power.power_speed : ''}" step="0.5" placeholder="ex: 60"></div>
      <div class="field" id="f-power-val-wrap"><label>Valeur</label><input type="number" id="f-power-val" value="${hasPower && c.power.value != null ? c.power.value : ''}" step="0.5" placeholder="optionnel"></div>
    </div>

    <div class="section-title">Coût d'invocation</div>
    <div class="form-grid">
      <div class="field"><label>Sacrifices requis</label><input type="number" id="f-sac" value="${c.cost.sacrifice}" min="0" step="1"></div>
    </div>
    <div id="materials-section">
      <div style="font-size:11px;color:var(--muted);margin-top:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Matériaux de fusion/rituel</div>
      <div class="materials-list" id="materials-list">
        ${(c.cost.materials || []).map(mid => `
          <div class="material-item" data-mid="${mid}">
            <span>${mid} — ${esc(getCardName(mid))}</span>
            <button onclick="removeMaterial('${mid}')">×</button>
          </div>
        `).join('')}
      </div>
      <div style="position:relative;margin-top:8px" id="material-search-wrap">
        <input type="text" id="material-search" placeholder="Rechercher une carte à ajouter..." autocomplete="off"
          oninput="filterMaterialSearch()" onfocus="showMaterialDropdown()" onblur="hideMaterialDropdown()"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;outline:none;font-size:13px">
        <div id="material-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:6px;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.4);margin-top:3px"></div>
      </div>
    </div>

    <div class="section-title">Archétypes</div>
    <div class="arch-chips" id="arch-chips">
      ${(c.archetypes || []).map(aid => `
        <span class="arch-chip" onclick="removeArchetype('${aid}')">
          ${getArchName(aid)} <span class="remove">×</span>
        </span>
      `).join('')}
      <button class="arch-add" onclick="openArchPickModal()">+ Ajouter</button>
    </div>

    <div class="actions">
      ${isNewCard
        ? `<button class="btn btn-success" onclick="createCard()">Créer la carte</button>
           <button class="btn btn-secondary" onclick="cancelNew()">Annuler</button>`
        : `<button class="btn btn-primary" onclick="saveCard()">Enregistrer</button>
           <button class="btn btn-danger" onclick="deleteCard()">Supprimer</button>`}
    </div>
  `;
  togglePowerFields();
}

function togglePowerFields() {
  const hasPower = document.getElementById('f-power-id')?.value;
  const speedWrap = document.getElementById('f-power-speed-wrap');
  const valWrap = document.getElementById('f-power-val-wrap');
  if (speedWrap) speedWrap.style.display = hasPower ? '' : 'none';
  if (valWrap) valWrap.style.display = hasPower ? '' : 'none';
}

function removeArchetype(aid) {
  syncCardFromForm();
  selectedCard.archetypes = (selectedCard.archetypes || []).filter(a => a !== aid);
  renderCardDetail();
}

function removeMaterial(mid) {
  syncCardFromForm();
  selectedCard.cost.materials = (selectedCard.cost.materials || []).filter(m => m !== mid);
  renderCardDetail();
}

function filterMaterialSearch() {
  const q = document.getElementById('material-search')?.value.toLowerCase() || '';
  const current = selectedCard.cost?.materials || [];
  const results = cards
    .filter(x => x.id !== selectedCard.id && !current.includes(x.id))
    .filter(x => !q || x.name.toLowerCase().includes(q) || x.id.toLowerCase().includes(q))
    .slice(0, 30);
  renderMaterialDropdown(results);
}

function renderMaterialDropdown(results) {
  const dd = document.getElementById('material-dropdown');
  if (!dd) return;
  if (!results.length) {
    dd.innerHTML = '<div style="padding:10px 14px;color:var(--muted);font-size:12px">Aucune carte trouvée</div>';
  } else {
    dd.innerHTML = results.map(x => `
      <div onmousedown="addMaterial('${x.id}')"
        style="padding:8px 14px;cursor:pointer;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border)"
        onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
        <div>
          <div style="font-size:13px">${esc(x.name)}</div>
          <div style="font-size:11px;color:var(--muted);font-family:monospace">${x.id} · T${Math.round(x.tier)} · ${summonLabel(x.summon_type)}</div>
        </div>
      </div>
    `).join('');
  }
  dd.style.display = 'block';
}

function showMaterialDropdown() {
  filterMaterialSearch();
}

function hideMaterialDropdown() {
  // Delay so onmousedown on items fires first
  setTimeout(() => {
    const dd = document.getElementById('material-dropdown');
    if (dd) dd.style.display = 'none';
  }, 150);
}

function addMaterial(id) {
  syncCardFromForm();
  if (!selectedCard.cost.materials) selectedCard.cost.materials = [];
  if (!selectedCard.cost.materials.includes(id)) {
    selectedCard.cost.materials.push(id);
    renderCardDetail();
  }
}

function syncCardFromForm() {
  if (!selectedCard || !document.getElementById('f-id')) return;
  const powId = document.getElementById('f-power-id')?.value;
  const powSpeed = document.getElementById('f-power-speed')?.value;
  const powVal = document.getElementById('f-power-val')?.value;
  selectedCard.id = document.getElementById('f-id').value.trim();
  selectedCard.name = document.getElementById('f-name').value.trim();
  selectedCard.type = 'monster';
  selectedCard.tier = parseFloat(document.getElementById('f-tier').value);
  selectedCard.summon_type = document.getElementById('f-summon').value;
  selectedCard.stats = {
    atk: parseFloat(document.getElementById('f-atk').value) || 0,
    hp: parseFloat(document.getElementById('f-hp').value) || 0,
    movement_speed: parseFloat(document.getElementById('f-move').value) || 0,
    attack_speed: parseFloat(document.getElementById('f-aspeed').value) || 0,
    initiative: parseFloat(document.getElementById('f-init').value) || 0,
    range: parseFloat(document.getElementById('f-range').value) || 0,
  };
  selectedCard.power = powId
    ? { id: powId, ...(powSpeed !== '' ? { power_speed: parseFloat(powSpeed) } : {}), ...(powVal !== '' ? { value: parseFloat(powVal) } : {}) }
    : {};
  selectedCard.cost = {
    sacrifice: parseFloat(document.getElementById('f-sac').value) || 0,
    materials: selectedCard.cost?.materials || [],
  };
}

function collectCardFromForm() {
  const powId = document.getElementById('f-power-id').value;
  const powSpeed = document.getElementById('f-power-speed')?.value;
  const powVal = document.getElementById('f-power-val')?.value;
  const power = powId
    ? { id: powId, ...(powSpeed !== '' ? { power_speed: parseFloat(powSpeed) } : {}), ...(powVal !== '' ? { value: parseFloat(powVal) } : {}) }
    : {};

  return {
    id: document.getElementById('f-id').value.trim(),
    name: document.getElementById('f-name').value.trim(),
    type: 'monster',
    tier: parseFloat(document.getElementById('f-tier').value),
    summon_type: document.getElementById('f-summon').value,
    archetypes: [...(selectedCard.archetypes || [])],
    stats: {
      atk: parseFloat(document.getElementById('f-atk').value),
      hp: parseFloat(document.getElementById('f-hp').value),
      movement_speed: parseFloat(document.getElementById('f-move').value),
      attack_speed: parseFloat(document.getElementById('f-aspeed').value),
      initiative: parseFloat(document.getElementById('f-init').value),
      range: parseFloat(document.getElementById('f-range').value),
    },
    power,
    cost: {
      sacrifice: parseFloat(document.getElementById('f-sac').value),
      materials: [...(selectedCard.cost.materials || [])],
    },
  };
}

async function saveCard() {
  const updated = collectCardFromForm();
  const oldId = selectedCard.id;
  if (!updated.id || !updated.name) return toast('ID et nom requis', 'err');

  const res = await apiFetch(`/api/cards/${oldId}`, { method: 'PUT', body: updated });
  if (res.error) return toast(res.error, 'err');

  const idx = cards.findIndex(c => c.id === oldId);
  updated._has_illustration = cards[idx]._has_illustration;
  cards[idx] = updated;
  selectedCard = updated;
  filterCards();
  renderCardDetail();
  toast('Carte enregistrée');
}

async function deleteCard() {
  if (!confirm(`Supprimer "${selectedCard.name}" ?`)) return;
  const res = await apiFetch(`/api/cards/${selectedCard.id}`, { method: 'DELETE' });
  if (res.error) return toast(res.error, 'err');
  cards = cards.filter(c => c.id !== selectedCard.id);
  selectedCard = null;
  filterCards();
  document.getElementById('card-detail').innerHTML = '<div class="empty"><span>Sélectionne une carte</span></div>';
  showList();
  toast('Carte supprimée');
}

function openNewCard() {
  const nextNum = cards.reduce((max, c) => {
    const m = c.id.match(/CORE_(\d+)/);
    return m ? Math.max(max, parseInt(m[1])) : max;
  }, 0) + 1;
  const newId = `CORE_${String(nextNum).padStart(3, '0')}`;

  selectedCard = {
    id: newId, name: '', type: 'monster', tier: 1, summon_type: 'normal',
    archetypes: [], stats: { atk: 10, hp: 100, movement_speed: 10, attack_speed: 10, initiative: 4, range: 1 },
    power: {}, cost: { sacrifice: 0, materials: [] }, _has_illustration: false,
  };
  isNewCard = true;
  renderCardList();
  renderCardDetail();
  showDetail();
}

async function createCard() {
  const card = collectCardFromForm();
  if (!card.id || !card.name) return toast('ID et nom requis', 'err');
  const res = await apiFetch('/api/cards', { method: 'POST', body: card });
  if (res.error) return toast(res.error, 'err');
  card._has_illustration = selectedCard._has_illustration || false;
  cards.push(card);
  selectedCard = card;
  isNewCard = false;
  filterCards();
  renderCardDetail();
  toast('Carte créée');
}

function cancelNew() {
  selectedCard = null;
  isNewCard = false;
  filterCards();
  document.getElementById('card-detail').innerHTML = '<div class="empty"><span>Sélectionne une carte</span></div>';
  showList();
}

// Illustration
function openIllusModal() {
  showModal(`
    <h2>Importer une illustration</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:14px">L'image sera téléchargée, convertie en PNG et sauvegardée sous <code>${selectedCard.id}.png</code></p>
    <div class="field">
      <label>URL de l'image</label>
      <input id="illus-url" type="text" placeholder="https://..." style="width:100%">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="importIllustration()">Importer</button>
    </div>
  `);
}

async function importIllustration() {
  const url = document.getElementById('illus-url').value.trim();
  if (!url) return toast('URL requise', 'err');
  closeModal();
  toast('Téléchargement en cours...', 'ok');
  const res = await apiFetch(`/api/cards/${selectedCard.id}/illustration`, { method: 'POST', body: { url } });
  if (res.error) return toast(res.error, 'err');
  selectedCard._has_illustration = true;
  const idx = cards.findIndex(c => c.id === selectedCard.id);
  if (idx !== -1) cards[idx]._has_illustration = true;
  filterCards();
  renderCardDetail();
  toast('Illustration importée');
}

async function deleteIllustration() {
  if (!confirm('Supprimer l\'illustration ?')) return;
  const res = await apiFetch(`/api/cards/${selectedCard.id}/illustration`, { method: 'DELETE' });
  if (res.error) return toast(res.error, 'err');
  selectedCard._has_illustration = false;
  const idx = cards.findIndex(c => c.id === selectedCard.id);
  if (idx !== -1) cards[idx]._has_illustration = false;
  filterCards();
  renderCardDetail();
  toast('Illustration supprimée');
}

// Archetype picker modal
function openArchPickModal() {
  const current = selectedCard.archetypes || [];
  showModal(`
    <h2>Ajouter un archétype</h2>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto">
      ${archetypes.filter(a => !current.includes(a.id)).map(a => `
        <div class="list-item" style="border-radius:6px" onclick="addArchetype('${a.id}')">
          <span style="font-size:16px">${a.icon || ''}</span>
          <div><div>${a.name}</div><div style="font-size:11px;color:var(--muted);font-family:monospace">${a.id}</div></div>
        </div>
      `).join('')}
    </div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Fermer</button></div>
  `);
}

function addArchetype(aid) {
  if (!selectedCard.archetypes) selectedCard.archetypes = [];
  if (!selectedCard.archetypes.includes(aid)) {
    syncCardFromForm();
    selectedCard.archetypes.push(aid);
    closeModal();
    renderCardDetail();
  }
}

// ================== ARCHETYPES ==================
function filterArchetypes() {
  const q = document.getElementById('arch-search').value.toLowerCase();
  const filtered = archetypes.filter(a => !q || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
  renderArchList(filtered);
}

function renderArchList(list = archetypes) {
  document.getElementById('arch-count').textContent = list.length;
  document.getElementById('arch-list').innerHTML = list.map(a => `
    <div class="list-item ${selectedArch && selectedArch.id === a.id ? 'selected' : ''}" onclick="selectArch('${a.id}')">
      <span style="font-size:18px">${a.icon || '❓'}</span>
      <div>
        <div class="item-name">${a.name}</div>
        <div class="item-id">${a.id}</div>
      </div>
      <span class="badge badge-summon" style="font-size:10px">${a.thresholds.length} seuils</span>
    </div>
  `).join('');
}

function selectArch(id) {
  selectedArch = archetypes.find(a => a.id === id);
  isNewArch = false;
  renderArchList();
  renderArchDetail();
  showDetail();
}

function renderArchDetail() {
  const a = selectedArch;
  const el = document.getElementById('arch-detail');
  el.innerHTML = `
    <button class="back-btn" onclick="showList()">Retour à la liste</button>
    <div class="detail-header" style="align-items:center;gap:16px">
      <div style="font-size:48px">${a.icon || '❓'}</div>
      <div>
        <div class="detail-title">${a.name}</div>
        <div style="font-family:monospace;font-size:11px;color:var(--muted)">${a.id}</div>
      </div>
    </div>

    <div class="section-title">Identité</div>
    <div class="form-grid">
      <div class="field"><label>ID</label><input id="af-id" value="${a.id}"></div>
      <div class="field"><label>Nom</label><input id="af-name" value="${esc(a.name)}"></div>
      <div class="field"><label>Icône (emoji)</label><input id="af-icon" value="${a.icon || ''}"></div>
      <div class="field"><label>Timing</label>
        <select id="af-timing">
          ${['start_of_combat','during_combat','end_of_combat','none'].map(t =>
            `<option value="${t}" ${a.timing===t?'selected':''}>${t}</option>`
          ).join('')}
        </select>
      </div>
    </div>

    <div class="section-title">Seuils <button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="addThreshold()">+ Seuil</button></div>
    <div id="thresholds-container">
      ${(a.thresholds || []).map((th, ti) => renderThresholdBlock(th, ti)).join('')}
    </div>

    <div class="actions">
      ${isNewArch
        ? `<button class="btn btn-success" onclick="createArchetype()">Créer l'archétype</button>
           <button class="btn btn-secondary" onclick="cancelNewArch()">Annuler</button>`
        : `<button class="btn btn-primary" onclick="saveArchetype()">Enregistrer</button>
           <button class="btn btn-danger" onclick="deleteArchetype()">Supprimer</button>`}
    </div>
  `;
}

function renderThresholdBlock(th, ti) {
  const medals = ['bronze','silver','gold','platinum'];
  return `
    <div class="threshold-block" id="th-${ti}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="field" style="flex:1"><label>Nombre de cartes requis</label><input type="number" id="th-${ti}-count" value="${th.count}" min="1" style="width:100%"></div>
        <div class="field" style="flex:1"><label>Médaille</label>
          <select id="th-${ti}-medal">
            ${medals.map(m => `<option value="${m}" ${th.medal===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-danger btn-sm" style="margin-top:16px" onclick="removeThreshold(${ti})">×</button>
      </div>
      ${(th.effects || []).map((ef, ei) => renderEffectBlock(ef, ti, ei)).join('')}
      <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addEffect(${ti})">+ Effet</button>
    </div>
  `;
}

function renderEffectBlock(ef, ti, ei) {
  return `
    <div class="effect-block" id="ef-${ti}-${ei}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">

// ================== STATS ==================
const STAT_LABELS = { atk: 'ATK', hp: 'HP', movement_speed: 'Déplacement', attack_speed: 'Vit. Attaque', initiative: 'Initiative', range: 'Portée' };
const STAT_KEYS = ['atk', 'hp', 'movement_speed', 'attack_speed', 'initiative', 'range'];
const TIER_COLORS = { 1: '#78c8a8', 2: '#6ab4e8', 3: '#c878e0', 4: '#f0a040', 5: '#f05050' };

let statsFilterTier = 0;
let statsThreshold = 1.5;

function mean(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }
function stdDev(arr) {
  if (arr.length < 2) return 0;
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
}

function computeTierStats() {
  const result = {};
  [1,2,3,4,5].forEach(tier => {
    const tc = cards.filter(c => Math.round(c.tier) === tier && c.stats);
    result[tier] = { count: tc.length, stats: {} };
    STAT_KEYS.forEach(key => {
      const vals = tc.map(c => c.stats[key]).filter(v => v != null && !isNaN(v));
      const m = mean(vals), s = stdDev(vals);
      result[tier].stats[key] = { avg: m, std: s, min: vals.length ? Math.min(...vals) : 0, max: vals.length ? Math.max(...vals) : 0 };
    });
  });
  return result;
}

function detectOutliers(tierStats) {
  const out = [];
  cards.forEach(card => {
    if (!card.stats) return;
    const tier = Math.round(card.tier);
    const ts = tierStats[tier];
    if (!ts) return;
    STAT_KEYS.forEach(key => {
      const v = card.stats[key];
      if (v == null || isNaN(v)) return;
      const { avg: m, std: s, min, max } = ts.stats[key];
      if (s < 0.5) return;
      const z = (v - m) / s;
      if (Math.abs(z) >= statsThreshold) out.push({ card, stat: key, value: v, avg: m, std: s, min, max, z });
    });
  });
  return out.sort((a, b) => Math.abs(b.z) - Math.abs(a.z));
}

function renderStats() {
  const el = document.getElementById('stats-content');
  const ts = computeTierStats();
  const outliers = detectOutliers(ts);
  const filteredOutliers = statsFilterTier ? outliers.filter(o => Math.round(o.card.tier) === statsFilterTier) : outliers;

  const tierRow = (key) => [1,2,3,4,5].map(tier => {
    const s = ts[tier].stats[key];
    if (!s || ts[tier].count === 0) return '<td style="color:var(--muted)">—</td>';
    const col = TIER_COLORS[tier];
    return `<td>
      <div class="stat-val">${s.avg.toFixed(1)}</div>
      <div class="stat-range">${s.min.toFixed(0)}–${s.max.toFixed(0)} <span style="color:var(--muted)">±${s.std.toFixed(1)}</span></div>
      <div class="mini-bar-wrap" style="margin-top:3px">
        <div class="mini-bar-track">
          <div class="mini-bar-fill" style="left:0;width:100%;background:${col};opacity:.18"></div>
          <div class="mini-bar-fill" style="
            left:${s.max > s.min ? ((s.avg - s.std - s.min)/(s.max - s.min)*100).toFixed(1) : 0}%;
            width:${s.max > s.min ? (s.std * 2 / (s.max - s.min) * 100).toFixed(1) : 100}%;
            background:${col};opacity:.5;max-width:100%
          "></div>
          <div class="mini-bar-fill" style="
            left:${s.max > s.min ? ((s.avg - s.min)/(s.max - s.min)*100).toFixed(1) : 50}%;
            width:2px;background:${col};opacity:1
          "></div>
        </div>
      </div>
    </td>`;
  }).join('');

  const overviewTable = `
    <div class="stat-panel" style="margin-bottom:20px">
      <h3>Synthèse par Tier</h3>
      <div style="overflow-x:auto">
        <table class="tier-overview-table">
          <thead>
            <tr>
              <th>Stat</th>
              ${[1,2,3,4,5].map(t => `<th style="color:${TIER_COLORS[t]}">Tier ${t} <span style="font-weight:400;color:var(--muted)">(${ts[t].count})</span></th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${STAT_KEYS.map(key => `<tr><td style="font-weight:600;color:var(--muted);white-space:nowrap">${STAT_LABELS[key]}</td>${tierRow(key)}</tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px">La barre montre la plage moyenne ± 1σ. Le trait vertical = moyenne du tier.</div>
    </div>
  `;

  const tierChips = `
    <div class="tier-filter-chips">
      <span style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px">Tier :</span>
      <button class="tier-chip ${statsFilterTier === 0 ? 'active' : ''}" onclick="setStatsFilter(0)" style="${statsFilterTier === 0 ? 'border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.15)' : ''}">Tous</button>
      ${[1,2,3,4,5].map(t => `<button class="tier-chip tier-chip-${t} ${statsFilterTier === t ? 'active' : ''}" onclick="setStatsFilter(${t})">T${t} <span style="font-size:10px;opacity:.7">(${ts[t].count})</span></button>`).join('')}
    </div>
  `;

  const thresholdControl = `
    <div class="threshold-row">
      <span>Seuil d'anomalie :</span>
      <input type="range" min="1" max="3" step="0.1" value="${statsThreshold}" oninput="setThreshold(this.value)">
      <span id="threshold-val" style="font-weight:700;color:var(--text);min-width:30px">${statsThreshold}σ</span>
      <span style="font-size:11px">${filteredOutliers.length} anomalie${filteredOutliers.length !== 1 ? 's' : ''} détectée${filteredOutliers.length !== 1 ? 's' : ''}</span>
    </div>
  `;

  const anomalyRows = filteredOutliers.length === 0
    ? `<div class="no-anomalies">✅ Aucune anomalie détectée avec ce seuil</div>`
    : `
      <div class="anomaly-header">
        <div>Carte</div><div>Tier</div><div>Stat</div><div>Valeur vs Moy.</div><div>Position</div><div>Écart</div>
      </div>
      ${filteredOutliers.map(o => {
        const tier = Math.round(o.card.tier);
        const col = TIER_COLORS[tier];
        const range = o.max - o.min;
        const pos = range > 0 ? ((o.value - o.min) / range * 100).toFixed(1) : 50;
        const avgPos = range > 0 ? ((o.avg - o.min) / range * 100).toFixed(1) : 50;
        const isHigh = o.z > 0;
        const severity = Math.abs(o.z);
        const zClass = severity >= 2.5 ? 'z-high' : 'z-mild';
        return `
          <div class="anomaly-row" onclick="jumpToCard('${o.card.id}')">
            <div class="anomaly-col-card">
              <div style="font-weight:600">${esc(o.card.name)}</div>
              <div style="font-size:10px;color:var(--muted);font-family:monospace">${o.card.id}</div>
              <div class="mobile-info" style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                <span class="badge" style="background:${col}22;color:${col};font-size:10px">T${tier}</span>
                <span style="font-size:11px;font-weight:600">${STAT_LABELS[o.stat]}</span>
                <span class="${isHigh ? 'direction-high' : 'direction-low'}" style="font-size:12px;font-weight:700">${isHigh ? '▲' : '▼'} ${o.value.toFixed(1)}<span style="color:var(--muted);font-weight:400"> / ${o.avg.toFixed(1)}</span></span>
              </div>
            </div>
            <div class="anomaly-col-tier"><span class="badge" style="background:${col}22;color:${col};font-size:10px">T${tier}</span></div>
            <div style="font-weight:600">${STAT_LABELS[o.stat]}</div>
            <div>
              <span class="${isHigh ? 'direction-high' : 'direction-low'}" style="font-weight:700">${isHigh ? '▲' : '▼'} ${o.value.toFixed(1)}</span>
              <span style="color:var(--muted)"> / ${o.avg.toFixed(1)}</span>
            </div>
            <div class="anomaly-col-pos">
              <div class="mini-bar-track" style="min-width:80px">
                <div class="mini-bar-fill" style="left:0;width:100%;background:${col};opacity:.1"></div>
                <div class="mini-bar-fill" style="left:${avgPos}%;width:2px;background:var(--muted);opacity:.6"></div>
                <div class="mini-bar-fill" style="left:${pos}%;width:3px;background:${isHigh ? 'var(--red)' : '#6ab4e8'};opacity:1"></div>
              </div>
              <div style="font-size:9px;color:var(--muted);margin-top:2px">${o.min.toFixed(0)} – ${o.max.toFixed(0)}</div>
            </div>
            <div><span class="z-chip ${zClass}">${severity.toFixed(1)}σ</span></div>
          </div>
        `;
      }).join('')}
    `;

  el.innerHTML = `
    ${overviewTable}
    <div class="stat-panel">
      <h3>Anomalies détectées <span style="font-size:11px;font-weight:400;color:var(--muted)">(cartes dont une stat s'écarte significativement de la moyenne du tier)</span></h3>
      ${tierChips}
      ${thresholdControl}
      <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
        ${anomalyRows}
      </div>
    </div>
  `;
}

function setStatsFilter(tier) {
  statsFilterTier = tier;
  renderStats();
}

function setThreshold(val) {
  statsThreshold = parseFloat(val);
  document.getElementById('threshold-val').textContent = statsThreshold.toFixed(1) + 'σ';
  const ts = computeTierStats();
  const outliers = detectOutliers(ts);
  const filtered = statsFilterTier ? outliers.filter(o => Math.round(o.card.tier) === statsFilterTier) : outliers;
  // Re-render just the anomaly count + rows
  renderStats();
}

// ================== IMPORT JSON ==================
let importType = null;
let importItems = null;

const IMPORT_LABELS = { cards: 'cartes', archetypes: 'archétypes', powers: 'pouvoirs' };

function openImportModal(type) {
  importType = type;
  importItems = null;
  showModal(`
    <h2>Importer des ${IMPORT_LABELS[type]}</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:14px">
      Sélectionne un fichier JSON contenant un tableau d'objets ou un objet avec une clé <code>${type}</code>.
    </p>
    <div class="field">
      <label>Fichier JSON</label>
      <input type="file" id="import-file" accept=".json" onchange="previewImport()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;width:100%">
    </div>
    <div id="import-preview" class="hidden" style="margin-top:12px">
      <div id="import-preview-info" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:12px"></div>
      <div class="field">
        <label>En cas de doublon (même ID)</label>
        <select id="import-mode">
          <option value="skip">Ignorer (conserver l'existant)</option>
          <option value="replace">Remplacer (écraser l'existant)</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="import-confirm-btn" disabled onclick="confirmImport()">Importer</button>
    </div>
  `);
}

function previewImport() {
  const file = document.getElementById('import-file')?.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let parsed = JSON.parse(e.target.result);
      if (Array.isArray(parsed)) {
        importItems = parsed;
      } else if (parsed && Array.isArray(parsed[importType])) {
        importItems = parsed[importType];
      } else {
        importItems = null;
        toast('Format invalide : tableau attendu', 'err');
        return;
      }
      const preview = document.getElementById('import-preview');
      const info = document.getElementById('import-preview-info');
      const btn = document.getElementById('import-confirm-btn');
      if (preview) preview.classList.remove('hidden');
      if (info) info.textContent = `${importItems.length} élément${importItems.length !== 1 ? 's' : ''} trouvé${importItems.length !== 1 ? 's' : ''} dans le fichier.`;
      if (btn) btn.disabled = false;
    } catch {
      importItems = null;
      toast('Fichier JSON invalide', 'err');
    }
  };
  reader.readAsText(file);
}

async function confirmImport() {
  if (!importItems || !importType) return;
  const mode = document.getElementById('import-mode')?.value || 'skip';
  closeModal();
  const endpoint = `/api/${importType}/import`;
  const res = await apiFetch(endpoint, { method: 'POST', body: { items: importItems, mode } });
  if (res.error) return toast(res.error, 'err');

  // Reload data from server
  if (importType === 'cards') {
    cards = await apiFetch('/api/cards');
    filterCards();
  } else if (importType === 'archetypes') {
    archetypes = await apiFetch('/api/archetypes');
    filterArchetypes();
  } else if (importType === 'powers') {
    powers = await apiFetch('/api/powers');
    filterPowers();
  }

  const parts = [];
  if (res.added)    parts.push(`${res.added} ajouté${res.added !== 1 ? 's' : ''}`);
  if (res.replaced) parts.push(`${res.replaced} remplacé${res.replaced !== 1 ? 's' : ''}`);
  if (res.skipped)  parts.push(`${res.skipped} ignoré${res.skipped !== 1 ? 's' : ''}`);
  toast(`Import terminé : ${parts.join(', ') || 'aucun changement'}`);
}

// ================== BOOT ==================
init();
</script>
</body>
